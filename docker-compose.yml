services:
  share-server:
    build:
      context: ./src-winui/ValleySteward.ShareServer
      dockerfile: Dockerfile
    image: valley-steward-share-server:latest
    container_name: valley-steward-share-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:5088:5088"
    environment:
      ASPNETCORE_URLS: "http://+:5088"
      VALLEY_STEWARD_SHARE_STORE: "/data/shares.json"
    volumes:
      - ./data/share-server:/data
